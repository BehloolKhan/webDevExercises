<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet", href="/css/reset.css">
    <link rel="stylesheet", href="/css/exercise4.css">

    
    <!-- link to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Lexend+Giga:wght@100..900&display=swap" rel="stylesheet">
    

</head>
<body>
    <form method="GET" action="https://drusmannaeem.co.uk/process.php">
        <fieldset>
            <legend>input Form</legend>
            <section>

                <label for="f-size">Shirt Size</label>
                <p>
                <select name="size", id="f-size">
                    <option>Choose size</option>
                    <option>XS</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                </select>
                </p>

                <label>Sleeves</label>
                <br>
                <input type="radio" name="sleeves", value="Short", checked> Short <br>
                <input type="radio" name="sleeves", value="Long"> Long <br>

                <label for="f-color">Choose shirt color</label>
                <p>
                    <input type="color", name="colorChosen", id="f-color">
                </p>

                <label for="f-quantity">Quantity</label>
                <p>
                  <input type="number" min="1" max="10" name="quantity", id="f-quantity">
                </p>

                <label for="date-requested">date requested</label>
                <p>
                  <input type="date" name="dateRequested", id="data-requested">
                </p>

            </section>


            <section>

                <label for="name">Name</label>
                <p>
                    <input type="text", name="name", id="name">
                </p>

                <label for="f-email">Email Adress</label>
                <p>
                    <input type="email", name="email", id="f-email">
                </p>

                <label>Telephone Number</label>
                <p>
                    <input type="tel", name="telephone", pattern="[0-9]{2}-[0-9]{3}-[0-9]{3}-[0-9]{4}">
                </p>

            </section>

            <section>
                <label for="f-address">Address</label>
                <p>
                <input type="text" name="address", id="f-address">
                </p>

                <label id="f-city">City</label>
                <p>
                    <input name="city", type="text" list="cities", id="f-city">
                </p>
                <datalist id="cities">
                    <option>London</option>
                    <option>NewYork</option>
                    <option>Dublin</option>
                    <option>Madrid</option>
                </datalist>

                <label for="f-postCode">Post Code</label>
                <br>
                <input type="text" pattern="[A-Z][A-Z0-9]{1,3}\s[0-9][A-Z]{2}", name="postCode", id="f-postCode">

            </section> 

            <footer>
                
                Please keep me informed about future shirt designs
                <input type="checkbox", name="informed">
                <br>

                <input type="submit">
                <input type="reset" value="clear the form">

            </footer>

        </fieldset>
    </form>
</body>
</html>
